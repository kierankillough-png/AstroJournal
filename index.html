<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AstroJournal – Thumbnail Migration</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #04060f; color: #d4ddf7; font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 13px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #080d1a; border: 1px solid rgba(100,140,220,0.12); border-radius: 8px; padding: 36px; max-width: 560px; width: 100%; }
h1 { font-family: Georgia, serif; font-size: 1.8rem; font-weight: 300; color: #fff; margin-bottom: 8px; }
h1 em { font-style: italic; color: #a78bfa; }
p { color: #6278a8; font-size: 12px; line-height: 1.7; margin-bottom: 24px; }
.btn { background: #4a7cf7; border: none; border-radius: 4px; padding: 12px 28px; color: #fff; font-family: monospace; font-size: 13px; cursor: pointer; width: 100%; transition: background 0.2s; }
.btn:hover { background: #3d6de0; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.log { margin-top: 24px; background: #04060f; border: 1px solid rgba(100,140,220,0.12); border-radius: 4px; padding: 16px; max-height: 320px; overflow-y: auto; font-size: 11px; line-height: 1.8; }
.log-entry { border-bottom: 1px solid rgba(100,140,220,0.06); padding: 3px 0; }
.log-entry.ok { color: #4fd1a0; }
.log-entry.skip { color: #6278a8; }
.log-entry.err { color: #e05a6a; }
.log-entry.info { color: #a78bfa; }
.progress { margin-top: 16px; background: #04060f; border: 1px solid rgba(100,140,220,0.12); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar { background: #4a7cf7; height: 100%; width: 0%; transition: width 0.3s; border-radius: 4px; }
.summary { margin-top: 16px; font-size: 12px; color: #d4ddf7; display: none; }
.summary.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Astro<em>Journal</em></h1>
  <p>This tool will scan all your imaging sessions, generate compressed thumbnails from any images found, and save them to the targets table. It only needs to be run once. Do not close this page while it is running.</p>
  <button class="btn" id="runBtn" onclick="run()">Run migration</button>
  <div class="progress" id="progressWrap" style="display:none"><div class="progress-bar" id="progressBar"></div></div>
  <div class="log" id="log" style="display:none"></div>
  <div class="summary" id="summary"></div>
</div>

<script>
const SB_URL = "https://qxulcmjmnxizyfamktlv.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dWxjbWptbnhpenlmYW1rdGx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTk5OTAsImV4cCI6MjA5MzQ5NTk5MH0.OZzvjyGWnZ71ylG_ATooNHDRhzl6AqDlujoFh7xqO5M";
const sbH = { "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":`Bearer ${SB_KEY}`, "Prefer":"return=representation" };

async function sbFetch(path, method="GET", body=null) {
  const opts = { method, headers: sbH };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function compressToThumbnail(base64) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const size = 400;
      const ratio = Math.min(size/img.width, size/img.height);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = () => resolve(null);
    img.src = base64;
  });
}

function log(msg, type="info") {
  const el = document.getElementById("log");
  el.style.display = "block";
  const div = document.createElement("div");
  div.className = `log-entry ${type}`;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById("progressBar").style.width = pct + "%";
}

async function run() {
  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.textContent = "Running…";
  document.getElementById("progressWrap").style.display = "block";

  let ok = 0, skipped = 0, errors = 0;

  try {
    log("Fetching all targets…");
    const targets = await sbFetch("/rest/v1/targets?select=id,name,thumbnail&order=created_at.desc");
    log(`Found ${targets.length} targets.`);

    for (let i = 0; i < targets.length; i++) {
      const t = targets[i];
      setProgress(Math.round((i / targets.length) * 100));

      if (t.thumbnail) {
        log(`⟳ ${t.name} — already has thumbnail, skipping`, "skip");
        skipped++;
        continue;
      }

      // Fetch sessions for this target one at a time to avoid timeout
      let sessions;
      try {
        sessions = await sbFetch(`/rest/v1/imaging_sessions?target_id=eq.${t.id}&select=id,image&image=not.is.null&order=created_at.desc&limit=1`);
      } catch(e) {
        log(`✗ ${t.name} — failed to fetch sessions: ${e.message}`, "err");
        errors++;
        continue;
      }

      if (!sessions || sessions.length === 0 || !sessions[0].image) {
        log(`— ${t.name} — no image found, skipping`, "skip");
        skipped++;
        continue;
      }

      try {
        const thumb = await compressToThumbnail(sessions[0].image);
        if (!thumb) throw new Error("Compression failed");
        await sbFetch(`/rest/v1/targets?id=eq.${t.id}`, "PATCH", { thumbnail: thumb });
        log(`✓ ${t.name} — thumbnail saved`, "ok");
        ok++;
      } catch(e) {
        log(`✗ ${t.name} — ${e.message}`, "err");
        errors++;
      }

      // Small delay between requests to avoid hammering the DB
      await new Promise(r => setTimeout(r, 300));
    }

    setProgress(100);
    const summary = document.getElementById("summary");
    summary.className = "summary show";
    summary.innerHTML = `Migration complete — <span style="color:#4fd1a0">${ok} updated</span>, <span style="color:#6278a8">${skipped} skipped</span>, <span style="color:#e05a6a">${errors} errors</span>`;
    btn.textContent = "Done ✓";
    log("Migration complete.", "info");

  } catch(e) {
    log(`Fatal error: ${e.message}`, "err");
    btn.disabled = false;
    btn.textContent = "Run migration";
  }
}
</script>
</body>
</html>
